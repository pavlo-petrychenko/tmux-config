# ─── General ───
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# ─── Prefix ───
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ─── Window Navigation ───
bind c new-window -c "#{pane_current_path}"
bind Tab last-window
bind -n C-1 select-window -t 1
bind -n C-2 select-window -t 2
bind -n C-3 select-window -t 3
bind -n C-4 select-window -t 4
bind -n C-5 select-window -t 5
bind -n C-6 select-window -t 6
bind -n C-7 select-window -t 7
bind -n C-8 select-window -t 8
bind -n C-9 select-window -t 9

# ─── Pane Splitting ───
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Pane Navigation (prefix + h/j/k/l) ───
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Pane Navigation (Alt + =/-, no prefix needed) ───
unbind -n M-Left
unbind -n M-Right
unbind -n M-Up
unbind -n M-Down
bind -n '≠' select-pane -t :.+
bind -n '–' select-pane -t :.-

# ─── Pane Resize ───
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Swap/Move Panes ───
bind -r '{' swap-pane -U
bind -r '}' swap-pane -D

# ─── Mouse Copy Mode ───
setw -g mode-keys vi
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ─── Pane Labels (border shows name) ───
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #T "

# ─── Status Bar (Pretty UI) ───
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26,nobold]"
set -g status-right "#[fg=#565f89]  %H:%M #[fg=#7aa2f7] %d-%b"
set -g window-status-format "#[fg=#565f89]  #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold]  #I:#W #[fg=#7aa2f7,bg=#1a1b26,nobold]"
set -g window-status-separator ""

# ─── Activity Monitoring ───
setw -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#e0af68"

# ─── Pane Borders ───
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# ─── Popup Terminal (Alt + t) ───
bind -n '†' display-popup -E -w 80% -h 80% -d "#{pane_current_path}"

# ─── Session Switching ───
bind s choose-tree -sZ

# ─── Service Menu (Alt + r, no prefix needed) ───
bind -n '®' display-menu -x C -y C -T " Services " \
  "Restart API + Frontend"     b "send-keys 'make restart s=api && make restart s=frontend' Enter" \
  "Restart API"                a "send-keys 'make restart s=api' Enter" \
  "Restart Frontend"           f "send-keys 'make restart s=frontend' Enter" \
  "Restart Frontend Landings"  l "send-keys 'make restart s=frontend-landings' Enter" \
  "" \
  "Rebuild API"               r "send-keys 'make rebuild s=api' Enter" \
  "" \
  "Logs API"                   A "send-keys 'make logs s=api' Enter" \
  "Logs Frontend"              F "send-keys 'make logs s=frontend' Enter" \
  "" \
  "DB Dev"                     d "run-shell 'db dev'" \
  "DB Stage"                   g "run-shell 'db stage'" \
  "DB Prod"                    p "run-shell 'db prod'" \
  "" \
  "Seed All"                   S "send-keys 'seed-all' Enter" \
  "Seed Changed"               u "send-keys 'seed-changed' Enter" \
  "" \
  "Status"                     s "send-keys 'make status' Enter" \
  "Stop All"                   x "send-keys 'make stop-all' Enter" \
  "" \
  "Git Clean Branches"         c "send-keys 'git-clean' Enter"

# ─── Message Style ───
set -g message-style "bg=#7aa2f7,fg=#1a1b26"

# ─── Plugins ───
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
